# Mobile-friendly tmux config for the claude workstation pod.
# Lives at /etc/tmux.conf so it survives the PVC overlay on /home/claude.

# --- Prefix --------------------------------------------------------------
# Ctrl-a is easier than Ctrl-b on a phone keyboard. Double-tap sends a
# literal Ctrl-a (start-of-line in shell).
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Mouse mode ----------------------------------------------------------
# Biggest mobile win: tap the status bar to switch windows, tap to focus
# panes, drag dividers to resize, touch-scroll the scrollback.
set -g mouse on

# --- Numbering -----------------------------------------------------------
# Windows and panes start at 1 so the prefix-1..9 map matches the keyboard.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Terminal capabilities ----------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- History -------------------------------------------------------------
set -g history-limit 50000

# --- Escape latency ------------------------------------------------------
# Tiny escape delay so vim's <Esc> is snappy.
set -sg escape-time 10

# --- Reload config -------------------------------------------------------
bind r source-file /etc/tmux.conf \; display-message "tmux config reloaded"

# --- Status bar (Catppuccin Mocha palette) -------------------------------
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] claude #[bg=#1e1e2e,fg=#89b4fa] "
set -g status-left-length 20

set -g status-right "#[fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e] %H:%M "
set -g status-right-length 30

setw -g window-status-format "#[fg=#cdd6f4] #I:#W "
setw -g window-status-current-format "#[bg=#cba6f7,fg=#1e1e2e,bold] #I:#W "
setw -g window-status-separator ""

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# --- Window navigation --------------------------------------------------
# Alt+arrow swaps windows without the prefix (laptop convenience).
bind-key -n M-Left previous-window
bind-key -n M-Right next-window

# --- Splits -------------------------------------------------------------
# More memorable split bindings; both inherit the current pane's cwd.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Copy mode ----------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
